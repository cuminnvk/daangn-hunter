name: Daangn Phone Hunter

on:
  schedule:
    - cron: "*/5 * * * *" # gọi mỗi 5 phút, scan_once tự chặn theo scan_interval_minutes
  workflow_dispatch: {} # bấm chạy thủ công
  repository_dispatch:
    types: [scan] # nút "Quét ngay" trên bot (Cloudflare Worker) kích hoạt

permissions:
  contents: write # để commit lại seen.json (chống trùng)

concurrency:
  group: daangn-hunter
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daangn_bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug trigger
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Refresh scan state
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- daangn_bot/seen.json daangn_bot/last_run.json || true
        working-directory: ${{ github.workspace }}

      - name: Run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          FORCE_SCAN: ${{ (github.event_name == 'workflow_dispatch' || github.event.client_payload.manual == true) && '1' || '0' }}
        run: python scan_once.py

      - name: Commit seen state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain daangn_bot/seen.json daangn_bot/last_run.json)" ]; then
            git add daangn_bot/seen.json daangn_bot/last_run.json
            git commit -m "chore: update seen state [skip ci]"
            git push
          else
            echo "Không có thay đổi state."
          fi
        working-directory: ${{ github.workspace }}
